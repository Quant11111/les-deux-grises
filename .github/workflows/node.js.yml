name: Node.js CI

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate
      - name: Build
        run: pnpm run build
      - name: Package build
        run: tar czf nextjs-build.tar.gz .next/ package.json pnpm-lock.yaml public/ prisma/
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: nextjs-build.tar.gz
          retention-days: 1

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
      - name: Extract build
        run: tar xzf nextjs-build.tar.gz && rm nextjs-build.tar.gz
      - name: Restore .env
        run: cp ~/env-lesdeuxgrises/.env .env
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate
      - name: Run database migrations
        run: pnpm exec prisma migrate deploy
      - name: Restart pm2
        run: pm2 restart lesdeuxgrises
